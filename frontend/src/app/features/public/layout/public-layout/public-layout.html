<header class="mobile-header" role="banner">

      <!-- Logo SVG integrado inline para máximo rendimiento -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="160" height="44" aria-hidden="true">
        <rect x="0" y="0" width="480" height="130" rx="12" fill="#111111"/>
        <rect x="0" y="0" width="8" height="130" rx="4" fill="#FFD000"/>
        <circle cx="72" cy="65" r="50" fill="#111111" stroke="#FFD000" stroke-width="4"/>
        <text x="58" y="92" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" text-anchor="middle">R</text>
        <text x="90" y="50" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="26" font-weight="700" fill="#FFD000" text-anchor="middle">A</text>
        <rect x="33" y="100" width="78" height="4" rx="2" fill="#FFD000"/>
        <text x="305" y="70" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="54" font-weight="900" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">RAMOS</text>
        <text x="305" y="108" font-family="'Barlow Condensed','Arial Narrow',Arial,sans-serif" font-size="22" font-weight="400" fill="#FFD000" letter-spacing="6" text-anchor="middle">NEUM&#193;TICOS</text>
      </svg>
    </a>
  </div>

  <!-- NAV DESKTOP -->
  <nav class="header-nav-desktop" aria-label="Navegacion principal">
    <a routerLink="/" routerLinkActive="nav-active"
       [routerLinkActiveOptions]="{exact: true}"
       class="nav-link">Inicio</a>
    <a routerLink="/servicios" routerLinkActive="nav-active"
       class="nav-link">Servicios</a>
    <a routerLink="/contacto" routerLinkActive="nav-active"
       class="nav-link">Contacto</a>
  </nav>

  <div class="header-actions">
    <a href="tel:+34912345678" class="header-btn-call" aria-label="Llamar al taller">
      📞 Llamar
    </a>
    <a routerLink="/reservar" class="header-btn-cita" aria-label="Reservar cita">
      📅 Cita
    </a>
  </div>

</header>

<!-- NAV MOBILE -->
<nav class="mobile-nav" role="navigation" aria-label="Navegacion mobile">
  <a routerLink="/" routerLinkActive="mobile-nav-active"
     [routerLinkActiveOptions]="{exact: true}"
     class="mobile-nav-item" aria-label="Inicio">
    <span aria-hidden="true">🏠</span>
    <span>Inicio</span>
  </a>
  <a routerLink="/servicios" routerLinkActive="mobile-nav-active"
     class="mobile-nav-item" aria-label="Servicios">
    <span aria-hidden="true">🔧</span>
    <span>Servicios</span>
  </a>
  <a routerLink="/reservar" routerLinkActive="mobile-nav-active"
     class="mobile-nav-item" aria-label="Reservar cita">
    <span aria-hidden="true">📅</span>
    <span>Reservar</span>
  </a>
  <a routerLink="/contacto" routerLinkActive="mobile-nav-active"
     class="mobile-nav-item" aria-label="Contacto">
    <span aria-hidden="true">📍</span>
    <span>Contacto</span>
  </a>
</nav>

<main id="main-content">
  <router-outlet />
</main>
