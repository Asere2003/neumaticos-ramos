version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: nr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: nr_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:             development
      PORT:                 3000
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SUPABASE_URL:         ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FRONTEND_URL:         http://localhost:4200
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - nr_network

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: nr_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nr_network

  prisma-studio:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: nr_prisma_studio
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - nr_network
    command: npx prisma studio --port 5555 --browser none

volumes:
  postgres_data:
    driver: local

networks:
  nr_network:
    driver: bridge